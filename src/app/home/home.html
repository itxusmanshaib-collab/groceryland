<app-header />
@if (isLoading()) {
  <div class="fixed inset-0 z-100 flex items-center justify-center bg-black/10">
    <div class="bg-white rounded-lg p-8 w-[80%] max-w-sm flex flex-col items-center shadow-xl">
      <h2 class="text-xl font-bold text-gray-800 mb-2">Loading</h2>
      <p class="text-gray-500 mb-6 text-lg">Please wait . . .</p>

      <div
        class="w-10 h-10 border-2 border-[rgb(31,233,149)] border-t-gray-200 rounded-full animate-spin"
      ></div>
    </div>
  </div>
}

<div [class.hidden]="isLoading()" class="mt-[calc(4rem+env(safe-area-inset-top))]">
  <app-banner-slider ></app-banner-slider>

  <app-top-categories (loaded)="onComponentLoaded('categories')" />
  <app-special-offers (loaded)="onComponentLoaded('offers')" />
  <app-popular-products (loaded)="onComponentLoaded('popular')" />
</div>
<app-bottom-menu />
