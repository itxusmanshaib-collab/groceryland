<div class="min-h-screen bg-white flex flex-col items-center px-6 pt-12">
  <div class="text-center mb-12">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Asset Zmart</h1>

    <div class="inline-block p-4 border border-gray-100 shadow-sm rounded-md">
      <img src="assets/logo.png" alt="Asset Zmart Logo" class="h-24 w-24 object-cover" />
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="sendOtp()" class="w-full max-w-md space-y-6">
    <div class="relative">
      <input
        type="tel"
        id="phone"
        formControlName="phone"
        placeholder="Phone number 03000000000"
        class="w-full border-b-2 py-3 px-1 text-gray-600 placeholder-gray-400 focus:outline-none focus:border-green-500 transition-colors"
      />
    </div>

    @if (form.get('phone')?.invalid && form.get('phone')?.touched) {
      <p class="text-red-600 text-sm">Enter Valid Phone Num .</p>
    }

    <button
      type="submit"
      [disabled]="isLoading"
      class="w-full bg-[#00B86B] disabled:opacity-60 hover:bg-[#009e5c] text-white py-3 rounded-md text-lg transition-all shadow-md active:scale-[0.98]"
    >
      {{ isLoading ? 'Please wait...' : 'LOGIN' }}
    </button>

    @if (errorMsg) {
      <p class="text-red-600 text-sm">{{ errorMsg }}</p>
    }
  </form>
</div>
