<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6">
    
    <div class="mb-6">
      <h3 class="text-2xl font-bold text-gray-800 text-center">
        Enter Your Detail
      </h3>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          First Name
        </label>
        <input 
          type="text"
          formControlName="FirstName"
          placeholder="Enter your First Name"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
        />
        <div *ngIf="form.get('FirstName')?.touched && form.get('FirstName')?.invalid"
             class="text-red-500 text-sm mt-1">
          First Name is required
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Last Name
        </label>
        <input 
          type="text"
          formControlName="LastName"
          placeholder="Enter your Last Name"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
        />
        <div *ngIf="form.get('LastName')?.touched && form.get('LastName')?.invalid"
             class="text-red-500 text-sm mt-1">
          Last Name is required
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Address
        </label>
        <textarea 
          formControlName="Address"
          rows="3"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
        ></textarea>
        <div *ngIf="form.get('Address')?.touched && form.get('Address')?.invalid"
             class="text-red-500 text-sm mt-1">
          Address is required
        </div>
      </div>

      <!-- Mobile -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Mobile Number
        </label>
        <input 
          type="tel"
          formControlName="Contact"
          placeholder="Enter your mobile number"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
        />
        <div *ngIf="form.get('Contact')?.invalid && form.get('Contact')?.touched"
             class="text-red-500 text-sm mt-1">
          <div *ngIf="form.get('Contact')?.errors?.['required']">
            Phone is required.
          </div>
          <div *ngIf="form.get('Contact')?.errors?.['pattern']">
            Invalid phone number.
          </div>
        </div>
      </div>

      <div>
        <button 
          type="submit"
          [disabled]="form.invalid || isSaving"
          class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition duration-300 disabled:opacity-60">
          {{ isSaving ? 'Saving...' : 'Submit' }}
        </button>
      </div>

    </form>
  </div>
</div>
