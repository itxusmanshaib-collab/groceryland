<div class="relative h-45 mx-4 mt-3 mb-1 rounded-2xl overflow-hidden shadow-lg">
  
  <!-- Slides Container -->
  <div 
    class="flex transition-transform duration-500 ease-in-out h-full"
    [style.transform]="'translateX(-' + currentSlide * 100 + '%)'"
  >
    <div
      *ngFor="let slide of slides"
      class="min-w-full h-full flex items-center justify-center"
    >
      <img
        [src]="slide.image"
        class="w-full h-full object-cover"
        [alt]="slide.alt"
        loading="lazy"
      />
    </div>
  </div>

  <!-- Dots -->
  <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1.5">
    <div 
      *ngFor="let slide of slides; let i = index"
      (click)="goToSlide(i)"
      class="h-2 rounded-full cursor-pointer transition-all duration-300"
      [class.w-5]="currentSlide === i"
      [class.bg-white]="currentSlide === i"
      [class.w-2]="currentSlide !== i"
      [class.bg-white/50]="currentSlide !== i"
    ></div>
  </div>

</div>
