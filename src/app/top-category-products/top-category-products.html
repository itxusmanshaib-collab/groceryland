<div class="flex items-center justify-between bg-white fixed w-full top-0 z-50 px-2 pb-2 pt-[calc(0.5rem+env(safe-area-inset-top))]">
  <a
    routerLink="/home"
    class="inline-block mb-4 p-2 ml-2 mt-2 bg-gray-100 rounded-full hover:bg-gray-200"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5 text-gray-600"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      />
    </svg>
  </a>

  <input
    type="text"
    placeholder="Search here"
    (input)="onSearch($any($event.target).value)"
    class="caret-green-500 mx-5 w-60 px-4 py-2 border border-gray-300 rounded-sm placeholder-gray-600 focus:outline-none"
  />

  <div 
  routerLink="/cart"
  class="text-2xl relative cursor-pointer p-2">
    <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
        />
      </svg>
    @if (selectedCount > 0) {
  <span
    class="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full animate-bounce"
  >
    {{ selectedCount }}
  </span>
}

  </div>
</div>

@if (!loading() && products().length === 0) {
  <p class="text-center text-gray-500 mt-10">
    No products found
  </p>
}

<div class="p-4 mt-[calc(4.5rem+env(safe-area-inset-top))] mb-8">
  @if (loading()) {
    <p class="text-center">Loading...</p>
  }

  @for (product of products(); track product.id) {

    <div
  class="flex border border-gray-300 rounded p-3 mb-2 cursor-pointer"
  (click)="viewProduct(product)"
>
  <img
    [src]="product.image"
    class="w-20 h-20 object-contain rounded-md"
    alt="{{ product.title }}"
  />

  <div class="flex-1 px-4 flex flex-col justify-between">
    <p class="text-sm font-semibold text-gray-800 line-clamp-2 text-right w-full">
      {{ product.title }}
    </p>

    <div class="flex justify-between items-center mt-auto">
      <span class="text-green-600 font-bold">
        Rs {{ product.price }}
      </span>

      <div class="flex items-center space-x-2">
        <button
          (click)="removeOne(product); $event.stopPropagation()"
          class="w-6 h-6 rounded-full bg-red-700 text-white shadow-sm flex items-center justify-center text-xl cursor-pointer"
        >
          -
        </button>

        <span class="w-8 text-center text-gray-700">
          {{ getQty(product.id) }}
        </span>

        <button
          (click)="add(product); $event.stopPropagation()"
          class="w-6 h-6 rounded-full bg-red-700 text-white shadow-sm flex items-center justify-center text-xl cursor-pointer"
        >
          +
        </button>
      </div>
    </div>
  </div>
</div>

  }

</div>
