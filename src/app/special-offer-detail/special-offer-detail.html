@if(product()) {
<div class="p-4 relative pt-[calc(env(safe-area-inset-top)+16px)]">
    <button type="button" (click)="goBack()" class="inline-block p-2 absolute left-4 top-[calc(env(safe-area-inset-top)+1rem)] mt-2 bg-gray-100 rounded-full hover:bg-gray-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
  </button>
<button
  onclick="this.classList.toggle('bg-red-500'); this.classList.toggle('bg-gray-100')"
  class="inline-block p-2 absolute right-4 top-[calc(env(safe-area-inset-top)+1rem)] mt-2 bg-gray-100 rounded-full transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
        </svg>
    </button>

  <img 
    [ngSrc]="product().thumbnail" 
    width="400" 
    height="256"
    priority
    class="w-full h-64 object-contain mb-4"
  >

  <h2 class="text-xl font-bold mb-2">
    {{ product().title }}
  </h2>

  <p class="text-green-600 text-lg font-semibold">
    Rs {{ product().price }}
  </p>

  <p class="text-gray-500 line-through">
    Rs {{ product().price + (product().price * product().discountPercentage / 100) | number:'1.0-0' }}
  </p>
       

</div>

}
 @else {
  <p class="text-center mt-6">Loading product details...</p>
}
