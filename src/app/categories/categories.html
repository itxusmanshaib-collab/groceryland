<app-header />

@if (loading()) {
  <div class="fixed inset-0 z-100 flex items-center justify-center bg-black/10 ">
    <div class="bg-white rounded-lg p-8 w-[80%] max-w-sm flex flex-col items-center shadow-xl">
      <h2 class="text-xl font-bold text-gray-800 mb-2">Loading</h2>
      <p class="text-gray-500 mb-6 text-lg">Please wait . . .</p>
      
     <div
        class="w-10 h-10 border-2 border-[#1fe995] border-t-gray-200 rounded-full animate-spin"
      ></div>
    </div>
  </div>
}

<div data-no-tab-swipe [class.hidden]="loading()" class="mb-20">
  <h2 class="font-bold text-xl pt-2 pl-4 pb-2 fixed bg-white z-40 w-full top-[calc(2.5rem+env(safe-area-inset-top))] left-0 ">
    All Categories
  </h2>

  <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 px-4 mt-[calc(6.5rem+env(safe-area-inset-top))] pb-4">
    @for (cat of categories(); track cat.CategoryId) {
      <div
        (click)="selectCategory(cat)"
        class="flex flex-col items-center justify-center p-2 border border-gray-200 rounded-sm shadow-sm active:scale-95 transition-transform cursor-pointer hover:scale-105"
      >
        <div class="w-full h-20 flex items-center justify-center rounded-lg overflow-hidden relative">
          <img
            [src]="getCategoryImage(cat.Image)"
            [alt]="cat.CategoryName"
            loading="lazy"
            class="max-h-full max-w-full object-contain"
            (error)="$any($event.target).src = 'assets/no-image.png'"
          />
        </div>

        <span class="text-center mt-2 line-clamp-2 text-sm">
          {{ cat.CategoryName }}
        </span>
      </div>
    }
  </div>
</div>

<app-bottom-menu />
