<div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t border-gray-300 z-50 pb-[env(safe-area-inset-bottom)]">
  <div class="grid grid-cols-4 items-center px-1">
    <button
      type="button"
      (click)="goHome()"
      [class.text-green-600]="isHomeActive()"
      class="flex items-center justify-center w-12 h-12 mx-auto shrink-0 text-gray-400 hover:text-green-600 rounded-full hover:bg-green-50 transition-colors active:scale-100"
    >
      <svg
        class="w-6 h-6"
        fill="currentColor"
        viewBox="0 0 20 20"
      >
        <path
          d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
        />
      </svg>
    </button>

    <a
      routerLink="/search"
      routerLinkActive="text-green-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center justify-center w-12 h-12 mx-auto shrink-0 text-gray-400 hover:text-green-600 rounded-full hover:bg-green-50 transition-colors active:scale-100"
    >
      <svg
       class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </a>

    <a
      routerLink="/cart"
      routerLinkActive="text-green-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center justify-center w-12 h-12 mx-auto shrink-0 text-2xl relative cursor-pointer text-gray-400 hover:text-green-600 transition-colors active:scale-100"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
        />
      </svg>

      @if(cartCount > 0) {
        <span
          class="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full animate-bounce"
        >
          {{ cartCount }}
      </span>
    }
    </a>

    <a
      routerLink="/settings"
      routerLinkActive="text-green-600 "
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center justify-center w-12 h-12 mx-auto shrink-0 text-gray-400 hover:text-green-600 rounded-full hover:bg-green-50 transition-colors active:scale-100"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
        />
      </svg>
    </a>
  </div>
</div>
