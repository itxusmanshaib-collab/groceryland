<app-header />

@if (loading()) {
  <div class="fixed inset-0 z-100 flex items-center justify-center bg-black/10 pt-[env(safe-area-inset-top)]">
    <div class="bg-white rounded-lg p-8 w-[80%] max-w-sm flex flex-col items-center shadow-xl">
      <h2 class="text-xl font-bold text-gray-800 mb-2">Loading</h2>
      <p class="text-gray-500 mb-6 text-lg">Please wait . . .</p>
      <div class="w-10 h-10 border-2 border-[#1fe995] border-t-gray-200 rounded-full animate-spin"></div>
    </div>
  </div>
}

<div [class.hidden]="loading()" class="mb-20 mt-[calc(4.5rem+env(safe-area-inset-top))]">
  <h2 class="font-bold text-xl pl-4 pb-2 fixed bg-white z-40 w-full top-0 left-0 ">
    {{ parentName() }}
  </h2>

  <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 px-4 mt-10 pb-4 ">
    @for (cat of subCategories(); track cat.CategoryId) {
      <div
        (click)="openProducts(cat)"
        class="flex flex-col items-center justify-center p-2 border border-gray-200 rounded-sm shadow-sm active:scale-95 transition-transform cursor-pointer hover:scale-105"
      >
        <div class="w-full h-20 flex items-center justify-center bg-gray-50 rounded-lg overflow-hidden">
          <img
            [src]="getCategoryImage(cat.Image)"
            [alt]="cat.CategoryName"
            loading="lazy"
            class="max-h-full max-w-full object-contain"
           
          />
        </div>
        <span class="text-center mt-2 line-clamp-2 text-sm">
          {{ cat.CategoryName }}
        </span>
      </div>
    } @empty {
      <div class="col-span-full text-center text-gray-500 mt-10">
        No sub categories found.
      </div>
    }
  </div>
</div>

<app-bottom-menu />
