  <h2 class="font-bold tracking-wider text-xl pt-2 pl-4 pb-2">Popular Products</h2>
<div class="p-4 space-y-4">
  <div *ngIf="filteredProducts().length === 0" class="text-center text-gray-500 py-10">
    No products found matching your search.
  </div>
 
  <div class="mb-15">
    <div
      *ngFor="let product of filteredProducts(); trackBy: trackById"
      class="flex border border-gray-300 rounded p-3 mb-2 cursor-pointer"
      (click)="viewProduct(product)"
    >
      <img
        [ngSrc]="product.thumbnail"
        width="80"
        height="96"
        class="w-20 h-24 object-contain rounded-md"
        alt="{{ product.title }}"
      />

      <div class="flex-1 px-4 flex flex-col justify-between">
        <p class="text-sm font-semibold text-gray-800 line-clamp-2 text-right w-full">
          {{ product.title }}
        </p>

        <div class="flex justify-between items-center mt-auto">
          <span class="text-green-600 font-bold">
            Rs {{ product.price - (product.price * product.discountPercentage) / 100 | number: '1.0-0' }}
          </span>

          <div class="flex items-center space-x-2">
            <button
              (click)="removeOne(product); $event.stopPropagation()"
              class="w-6 h-6 rounded-full bg-red-700 text-white shadow-sm flex items-center justify-center text-xl cursor-pointer"
            >
              -
            </button>

            <span class="w-8 text-center text-gray-700">
              {{ getQty(product.id) }}
            </span>

            <button
              (click)="add(product); $event.stopPropagation()"
              class="w-6 h-6 rounded-full bg-red-700 text-white shadow-sm flex items-center justify-center text-xl cursor-pointer"
            >
              +
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
