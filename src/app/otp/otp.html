<div class="min-h-screen bg-gray-50 flex flex-col justify-center px-6 pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
  <div class="max-w-md w-full mx-auto bg-white p-8 rounded-2xl shadow-lg">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-800">Verify your Mobile Number</h2>
      <p class="text-gray-500 mt-2">Enter the 4-digit code sent to your mobile number.</p>
      @if (phone) {
        <p class="text-gray-500 text-sm mt-1">{{ phone }}</p>
      }
    </div>

    <div class="flex justify-center gap-2 mb-6">
      @for (digit of otp; track $index) {
        <input
          type="text"
          maxLength="1"
          class="w-12 h-14 text-center text-xl font-extrabold text-slate-900 bg-slate-100 border border-transparent hover:border-slate-200 appearance-none rounded-lg p-4 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all"
          [(ngModel)]="otp[$index]"
          (input)="onInput($event, $index)"
          (keydown)="onKeyDown($event, $index)"
        />
      }
    </div>

    <button
      (click)="verifyOtp()"
      [disabled]="isLoading || !isOtpComplete()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors shadow-md disabled:opacity-50"
    >
      {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
    </button>

    @if (errorMsg) {
      <p class="text-center mt-4 text-sm text-red-600">{{ errorMsg }}</p>
    }

    @if (infoMsg) {
      <p class="text-center mt-4 text-sm text-green-600">{{ infoMsg }}</p>
    }

    <p class="text-center mt-6 text-sm text-gray-500">
      Otp not received?
      <button
        type="button"
        (click)="resendOtp()"
        [disabled]="isResending"
        class="text-green-600 font-medium hover:underline disabled:opacity-60"
      >
        {{ isResending ? 'Sending...' : 'Resend' }}
      </button>
    </p>
  </div>
</div>
